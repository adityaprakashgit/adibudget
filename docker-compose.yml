services:
  firefly-db:
    image: mariadb:11.4
    container_name: firefly-db
    restart: unless-stopped
    env_file:
      - .db.env
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - firefly-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 20

  firefly-app:
    image: fireflyiii/core:latest
    container_name: firefly-app
    restart: unless-stopped
    depends_on:
      firefly-db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - firefly-storage:/var/www/html/storage

  firefly-cron:
    image: alpine:3.20
    container_name: firefly-cron
    restart: unless-stopped
    depends_on:
      - firefly-app
    environment:
      STATIC_CRON_TOKEN: ${STATIC_CRON_TOKEN}
      TZ: ${TZ}
    command: >
      /bin/sh -c
      "echo '0 * * * * wget -qO- http://firefly-app:8080/api/v1/cron/'\"$$STATIC_CRON_TOKEN\"' >/proc/1/fd/1 2>/proc/1/fd/2'
      > /etc/crontabs/root &&
      crond -f -l 2"

volumes:
  firefly-db:
  firefly-storage:
