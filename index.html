
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adi Budget Console</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #111;
    color: white;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 420px;
    margin: auto;
}

h2 {
    text-align: center;
}

input, button {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

input {
    background: #222;
    color: white;
}

button {
    background: #00c853;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    background: #1c1c1c;
    padding: 15px;
    border-radius: 10px;
}

hr {
    border: 0;
    height: 1px;
    background: #333;
    margin: 15px 0;
}
</style>
</head>

<body>

<div class="container">
    <h2>Monthly Budget Reset</h2>

    <p><strong>Step 1:</strong> Transfer ALL balances into MASTER account.</p>

    <label>Salary Credited (₹)</label>
    <input type="number" id="salary" placeholder="Enter salary">

    <label>Master Account Total After Transfer (₹)</label>
    <input type="number" id="master" placeholder="Enter master balance">

    <button onclick="calculate()">Generate Plan</button>

    <div class="result" id="output"></div>
</div>

<script>
function calculate() {

    const fixed = 70000;
    const lifestyle = 110000;
    const buffer = 50000;

    let master = parseFloat(document.getElementById("master").value);

    if (!master) {
        document.getElementById("output").innerHTML = "Please enter valid numbers.";
        return;
    }

    let wealth = master - fixed - lifestyle - buffer;

    document.getElementById("output").innerHTML =
        `<p>Move ₹${fixed.toLocaleString()} → Fixed Expenses</p>
         <p>Keep ₹${lifestyle.toLocaleString()} → Lifestyle</p>
         <p>Maintain ₹${buffer.toLocaleString()} → Buffer</p>
         <hr>
         <p><strong>Invest ₹${wealth.toLocaleString()} → Wealth</strong></p>`;
}
</script>


</body>
</html>
