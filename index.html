<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal CFO</title>

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>

<body>

<div class="app-shell">

  <aside class="sidebar">
    <div>
      <div class="brand">Personal CFO</div>

      <nav>
        <div class="nav-item active" data-page="dashboard">Dashboard</div>
        <div class="nav-item" data-page="transactions">Transactions</div>
      </nav>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div id="pageTitle" class="page-title">Dashboard</div>
    </header>

    <main id="content" class="page-container"></main>
  </div>
</div>

<button type="button" class="fab" id="fabBtn">+</button>

<div class="modal-overlay hidden" id="globalModal">
  <div class="modal-card">
    <div class="modal-header">
      <div>Add Transaction</div>
      <div id="closeModal">✕</div>
    </div>

    <div class="stack">
      <select id="transactionType" class="input">
        <option value="expense">Expense</option>
        <option value="income">Income</option>
      </select>

      <input id="amountInput" type="number" class="input" placeholder="Amount" />

      <select id="categoryInput" class="input">
        <option value="food">Food</option>
        <option value="travel">Travel</option>
        <option value="salary">Salary</option>
      </select>

      <button id="saveTransactionBtn" class="btn btn-primary">
        Save
      </button>
    </div>
  </div>
</div>

<!-- IMPORTANT: Order matters -->
<script src="js/app.js" defer></script>
<script src="js/router.js" defer></script>
<script src="js/ui.js" defer></script>

</body>
</html>
