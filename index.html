<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>adibudget</title>

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div>
        <div class="brand">adibudget</div>
        <div class="sub nav-subtitle">Custom UI on top of Firefly III</div>

        <nav class="nav-stack">
          <div class="nav-item active" data-page="dashboard">Dashboard</div>
          <div class="nav-item" data-page="transactions">Transactions</div>
          <div class="nav-item" data-page="review">Review</div>
          <div class="nav-item" data-page="accounts">Accounts</div>
          <div class="nav-item" data-page="budgets">Budgets</div>
          <div class="nav-item" data-page="categories">Categories</div>
          <div class="nav-item" data-page="tags">Tags</div>
          <div class="nav-item" data-page="recurring">Recurring</div>
          <div class="nav-item" data-page="settings">Settings</div>
        </nav>
      </div>

      <div class="nav-footer-card">
        <div class="label">Connection</div>
        <div id="navHealthStatus" class="status-pill status-idle">Checking</div>
        <div class="sub">Tokens stay on the backend.</div>
      </div>
    </aside>

    <div class="main-area">
      <header class="topbar">
        <div>
          <div id="pageTitle" class="page-title">Dashboard</div>
          <div id="pageSubtitle" class="sub">Day-to-day finance management from one UI.</div>
        </div>

        <div class="topbar-actions">
          <form id="globalSearchForm" class="global-search">
            <input
              id="globalSearchInput"
              class="input global-search-input"
              type="search"
              placeholder="Search merchants, tags, months"
              autocomplete="off"
            />
          </form>
          <button type="button" class="btn btn-primary" data-open-modal="quick-add">
            Quick Add
          </button>
          <button type="button" class="btn btn-secondary" data-open-page="search">
            Search
          </button>
          <button type="button" class="btn btn-secondary" data-open-modal="health-check">
            Check Connection
          </button>
          <button type="button" class="btn btn-primary" data-open-modal="transaction-create">
            New Entry
          </button>
        </div>
      </header>

      <main id="content" class="page-container"></main>
    </div>
  </div>

  <button type="button" class="fab" id="fabBtn">+</button>

  <div class="modal-overlay hidden" id="globalModal">
    <div class="modal-card modal-card-lg">
      <div class="modal-header">
        <div>
          <div id="modalTitle" class="modal-title">Create</div>
          <div id="modalSubtitle" class="sub">Manage your finance data without leaving adibudget.</div>
        </div>
        <button type="button" id="closeModal" class="modal-close-btn" aria-label="Close">
          ✕
        </button>
      </div>

      <div id="modalError" class="alert alert-error hidden"></div>
      <div id="modalBody" class="stack"></div>

      <div class="modal-actions">
        <button type="button" id="modalSecondaryAction" class="btn btn-secondary">
          Cancel
        </button>
        <button type="button" id="modalPrimaryAction" class="btn btn-primary">
          Save
        </button>
      </div>
    </div>
  </div>

  <script src="js/app.js" defer></script>
  <script src="js/v2.js" defer></script>
  <script src="js/router.js" defer></script>
  <script src="js/ui.js" defer></script>
</body>
</html>
