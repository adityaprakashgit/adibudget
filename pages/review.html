<div class="stack">
  <div class="card">
    <div class="section-header">
      <div>
        <div class="label">Monthly Review</div>
        <div class="sub">A fast read on income, expense, savings, categories, and merchants.</div>
      </div>
      <label class="field-stack" style="min-width:180px;">
        <span class="label">Month</span>
        <input class="input" id="reviewMonthInput" type="month" />
      </label>
    </div>
  </div>

  <div id="monthlyReviewMetrics" class="grid-4"></div>

  <div class="grid-2">
    <div class="card">
      <div class="label">Top Categories</div>
      <div id="monthlyReviewCategories"></div>
    </div>
    <div class="card">
      <div class="label">Biggest Merchants</div>
      <div id="monthlyReviewMerchants"></div>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="label">Unusual Transactions</div>
      <div id="monthlyReviewUnusual"></div>
    </div>
    <div class="card">
      <div class="label">Recent Activity</div>
      <div id="monthlyReviewRecent"></div>
    </div>
  </div>
</div>
